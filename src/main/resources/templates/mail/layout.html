<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Email</title>
</head>
<body th:fragment="body(content)"
      style="margin:0; padding:0; background:#f4f2ed; font-family:Arial,Helvetica,sans-serif; color:#23201c;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f2ed; padding:24px 0;">
    <tr>
        <td align="center">
            <table role="presentation" width="600" cellpadding="0" cellspacing="0"
                   style="max-width:600px; width:100%; background:#ffffff; border-radius:10px; overflow:hidden;">
                <!-- Header -->
                <tr>
                    <td style="background:#1c3a2e; padding:24px; text-align:center;">
                        <span style="color:#ffffff; font-size:20px; font-weight:bold;"
                              th:text="${brand != null ? brand.brandName() : 'Celtech Kitchen'}">Celtech Kitchen</span>
                    </td>
                </tr>
                <!-- Body slot -->
                <tr>
                    <td style="padding:32px 28px;">
                        <th:block th:replace="${content}">content</th:block>
                    </td>
                </tr>
                <!-- Footer -->
                <tr>
                    <td style="padding:20px 28px; border-top:1px solid #eee; font-size:12px; color:#888;">
                        <p style="margin:0 0 4px;"
                           th:text="${brand != null ? brand.brandName() : 'Celtech Kitchen'}">Celtech Kitchen</p>
                        <p style="margin:0;" th:if="${brand != null and brand.contactEmail() != null}">
                            Questions? <a th:href="'mailto:' + ${brand.contactEmail()}"
                                          th:text="${brand.contactEmail()}"
                                          style="color:#1c3a2e;">support@example.com</a>
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
