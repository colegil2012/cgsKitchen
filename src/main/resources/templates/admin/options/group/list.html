<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head(~{::title}, ~{::pageStyles})}">
    <title th:text="|Groups — Admin — ${brand.brandName()}|">Groups</title>
    <th:block th:fragment="pageStyles">
        <link rel="stylesheet" th:href="@{/css/pages/admin.css}">
    </th:block>
</head>
<body>

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="admin">
    <div class="container">
        <header class="admin__header">
            <span class="admin__link">
                <a th:href="@{/admin/options}">← Options</a>
            </span>
            <h1 class="admin__title">Groups</h1>
            <p class="text-muted">
                Reusable bundles of choices, with a selection type and an optional default.
                Disable a group to hide it from every dish that uses it.
            </p>
        </header>

        <div class="alert alert-success" th:if="${notice}" th:text="${notice}">notice</div>
        <div class="alert alert-error"   th:if="${error}"  th:text="${error}">error</div>

        <div class="admin__toolbar">
            <a class="btn btn-primary" th:href="@{/admin/options/group/new}">+ New group</a>
        </div>

        <section class="admin__section">
            <table class="admin__table">
                <thead>
                <tr>
                    <th>Label</th>
                    <th>Type</th>
                    <th>Choices</th>
                    <th>Status</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="g : ${groups}">
                    <td>
                        <a th:href="@{|/admin/options/group/${g.id}|}" th:text="${g.label}">label</a>
                        <span class="admin__chip" th:if="${g.required}">required</span>
                    </td>
                    <td th:text="${g.selectionType}">SINGLE</td>
                    <td th:text="${g.choiceIds == null ? 0 : g.choiceIds.size()}">0</td>
                    <td>
                        <span th:if="${g.available}" class="admin__status admin__status--ok">On</span>
                        <span th:unless="${g.available}" class="admin__status admin__status--out">Off</span>
                    </td>
                    <td class="admin__row-actions">
                        <form th:action="@{|/admin/options/group/${g.id}/toggle-availability|}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-ghost btn-sm" type="submit"
                                    th:text="${g.available} ? 'Disable' : 'Enable'">Disable</button>
                        </form>
                        <a class="btn btn-ghost btn-sm" th:href="@{|/admin/options/group/${g.id}|}">Edit</a>
                        <form th:action="@{|/admin/options/group/${g.id}/delete|}" method="post"
                              onsubmit="return confirm('Delete this group permanently?');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-ghost btn-sm" type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
