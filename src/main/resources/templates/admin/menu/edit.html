<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head(~{::title}, ~{::pageStyles})}">
    <title th:text="|${item.id == null ? 'New' : 'Edit'} menu item — Admin|">Edit item</title>
    <th:block th:fragment="pageStyles">
        <link rel="stylesheet" th:href="@{/css/pages/admin.css}">
    </th:block>
</head>
<body>

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="admin">
    <div class="container">
        <header class="admin__header">
            <span class="admin__link">
                <a th:href="@{/admin/menu}">← Menu</a>
            </span>
            <h1 class="admin__title"
                th:text="${item.id == null ? 'New item' : item.name}">Edit item</h1>
        </header>

        <form th:action="@{/admin/menu/save}" method="post" class="admin__form stack">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="id" th:value="${item.id}">

            <div class="form-field">
                <label class="form-label" for="name">Name</label>
                <input class="form-input" id="name" name="name"
                       th:value="${item.name}" required>
            </div>

            <div class="form-field">
                <label class="form-label" for="description">Description</label>
                <textarea class="form-textarea" id="description" name="description"
                          th:text="${item.description}"></textarea>
            </div>

            <div class="admin__form-row">
                <div class="form-field">
                    <label class="form-label" for="priceCents">Price (cents)</label>
                    <input class="form-input" id="priceCents" type="number" name="priceCents"
                           th:value="${item.priceCents}" required min="0">
                </div>
                <div class="form-field">
                    <label class="form-label" for="priceDisplay">Price display (optional)</label>
                    <input class="form-input" id="priceDisplay" name="priceDisplay"
                           th:value="${item.priceDisplay}" placeholder="auto">
                </div>
                <div class="form-field">
                    <label class="form-label" for="prepTimeMinutes">Prep time (min)</label>
                    <input class="form-input" type="number" id="prepTimeMinutes" name="prepTimeMinutes"
                           th:value="${item.prepTimeMinutes}" min="1" placeholder="(use category default)">
                    <span class="form-help">Override the category's default prep time for this item.</span>
                </div>
                <div class="form-field">
                    <label class="form-label" for="sortOrder">Sort order</label>
                    <input class="form-input" id="sortOrder" type="number" name="sortOrder"
                           th:value="${item.sortOrder}">
                </div>
            </div>

            <div class="admin__form-row">
                <div class="form-field">
                    <label class="form-label" for="categoryId">Category</label>
                    <select class="form-input" id="categoryId" name="categoryId" required>
                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:selected="${c.id == item.categoryId}"
                                th:text="${c.name}">cat</option>
                    </select>
                </div>
                <div class="form-field">
                    <label class="form-label" for="badgeId">Badge</label>
                    <select class="form-input" id="badgeId" name="badgeId">
                        <option value="">— none —</option>
                        <option th:each="b : ${badges}"
                                th:value="${b.id}"
                                th:selected="${b.id == item.badgeId}"
                                th:text="${b.label}">badge</option>
                    </select>
                </div>
            </div>

            <div class="form-field">
                <label class="form-label">Option groups</label>
                <div class="admin__checkbox-grid">
                    <label class="menu-card__checkbox" th:each="g : ${allGroups}">
                        <input type="checkbox" name="optionGroupIds" th:value="${g.id}"
                               th:checked="${item.optionGroupIds != null and #lists.contains(item.optionGroupIds, g.id)}">
                        <span th:text="${g.label}">group</span>
                    </label>
                </div>
            </div>

            <label class="form-toggle">
                <input type="checkbox" name="available" value="true" th:checked="${item.available}">
                <span>Available (visible on the menu)</span>
            </label>

            <div class="admin__form-actions">
                <a class="btn btn-ghost" th:href="@{/admin/menu}">Cancel</a>
                <button class="btn btn-primary" type="submit">Save</button>
            </div>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
