<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head(~{::title}, ~{::pageStyles})}">
    <title th:text="|Menu — Admin — ${brand.brandName()}|">Menu admin</title>
    <th:block th:fragment="pageStyles">
        <link rel="stylesheet" th:href="@{/css/pages/admin.css}">
    </th:block>
</head>
<body>

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="admin">
    <div class="container">
        <header class="admin__header">
            <span class="admin__link">
                <a th:href="@{/admin}">← Admin</a>
            </span>
            <h1 class="admin__title">Menu items</h1>
        </header>

        <div class="alert alert-success" th:if="${notice}" th:text="${notice}">notice</div>
        <div class="alert alert-error"   th:if="${error}"  th:text="${error}">error</div>

        <div class="admin__toolbar">
            <a class="btn btn-primary" th:href="@{/admin/menu/new}">+ New item</a>
        </div>

        <section class="admin__section">
            <table class="admin__table">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Sort</th>
                    <th>Status</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${items}">
                    <td>
                        <a th:href="@{|/admin/menu/${item.id}|}"
                           th:text="${item.name}">Name</a>
                        <span class="admin__chip" th:if="${item.badgeId != null}"
                              th:text="${item.badgeId}">badge</span>
                    </td>
                    <td th:text="${item.categoryId}">cat</td>
                    <td th:text="${item.priceDisplay}">$0.00</td>
                    <td th:text="${item.sortOrder}">0</td>
                    <td>
                        <span th:if="${item.available}"  class="admin__status admin__status--ok">Available</span>
                        <span th:unless="${item.available}" class="admin__status admin__status--out">86'd</span>
                    </td>
                    <td class="admin__row-actions">
                        <form th:action="@{|/admin/menu/${item.id}/toggle-availability|}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-ghost btn-sm" type="submit"
                                    th:text="${item.available} ? '86' : 'Restore'">86</button>
                        </form>
                        <form th:action="@{|/admin/menu/${item.id}/delete|}" method="post"
                              onsubmit="return confirm('Delete this item permanently?');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-ghost btn-sm" type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
