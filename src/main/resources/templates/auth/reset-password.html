<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head(~{::title}, ~{::pageStyles})}">
    <title th:text="|${brand.brandName()} : Choose a new password|">Choose a new password</title>
    <th:block th:fragment="pageStyles">
        <link rel="stylesheet" th:href="@{/css/pages/auth.css}">
    </th:block>
</head>
<body>

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="auth">
    <div class="auth__card">
        <header class="auth__header">
            <span class="stamp text-muted">Reset password</span>
            <h1 class="auth__title">Choose a new password</h1>
        </header>

        <div class="alert alert-error" th:if="${error}" th:text="${error}">error</div>

        <!-- Invalid/expired token: no form, just a path back to request a new link -->
        <div th:unless="${validToken}">
            <div class="alert alert-error">
                This reset link is invalid or has expired.
            </div>
            <p class="auth__alt">
                <a class="btn btn-primary btn-lg auth__submit" th:href="@{/forgot-password}">
                    Request a new link →
                </a>
            </p>
        </div>

        <!-- Valid token: show the new-password form -->
        <form th:if="${validToken}" th:action="@{/reset-password}" method="post"
              th:object="${resetForm}" class="auth__form" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="token" th:value="${token}"/>

            <div class="form-field">
                <label class="form-label" for="password">New password</label>
                <input class="form-input" type="password" id="password"
                       th:field="*{password}" required autocomplete="new-password">
                <span class="form-help">At least 10 characters, with a letter and a number.</span>
                <span class="form-error" th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"></span>
            </div>

            <div class="form-field">
                <label class="form-label" for="passwordConfirm">Confirm new password</label>
                <input class="form-input" type="password" id="passwordConfirm"
                       th:field="*{passwordConfirm}" required autocomplete="new-password">
                <span class="form-error" th:if="${#fields.hasErrors('passwordConfirm')}"
                      th:errors="*{passwordConfirm}"></span>
            </div>

            <button class="btn btn-primary btn-lg auth__submit" type="submit">Update password →</button>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
