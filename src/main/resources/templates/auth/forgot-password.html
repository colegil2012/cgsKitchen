<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head(~{::title}, ~{::pageStyles})}">
    <title th:text="|${brand.brandName()} : Reset password|">Reset password</title>
    <th:block th:fragment="pageStyles">
        <link rel="stylesheet" th:href="@{/css/pages/auth.css}">
    </th:block>
</head>
<body>

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="auth">
    <div class="auth__card">
        <header class="auth__header">
            <span class="stamp text-muted">Forgot password</span>
            <h1 class="auth__title">Reset your password</h1>
        </header>

        <div class="alert alert-success" th:if="${submitted}">
            If an account exists for that email, we've sent a reset link.
            Check your inbox (and spam folder).
        </div>

        <form th:unless="${submitted}" th:action="@{/forgot-password}" method="post" class="auth__form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <p class="text-muted">Enter your email and we'll send you a link to choose a new password.</p>

            <div class="form-field">
                <label class="form-label" for="email">Email</label>
                <input class="form-input" type="email" id="email" name="email"
                       required autofocus autocomplete="email">
            </div>

            <button class="btn btn-primary btn-lg auth__submit" type="submit">Send reset link →</button>

            <p class="auth__alt">
                Remembered it? <a th:href="@{/login}">Sign in</a>
            </p>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
