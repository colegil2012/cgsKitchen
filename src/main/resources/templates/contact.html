<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head(~{::title}, ~{::pageStyles})}">
    <title th:text="|Contact — ${brand.brandName()}|">Contact</title>
    <th:block th:fragment="pageStyles">
        <link rel="stylesheet" th:href="@{/css/pages/about-contact.css}">
    </th:block>
</head>

<body>

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="content-page">
    <div class="content-page__inner">
        <h1 class="content-page__title">
            Get in <em>touch.</em>
        </h1>

        <div class="contact-info">
            <div class="contact-info__card">
                <div class="contact-info__label">Today's spot</div>
                <div class="contact-info__value" th:text="${brand.addressToday()}">Address</div>
            </div>
            <div class="contact-info__card">
                <div class="contact-info__label">Email</div>
                <a class="contact-info__value"
                   th:href="'mailto:' + ${brand.contactEmail()}"
                   th:text="${brand.contactEmail()}">email</a>
            </div>
            <div class="contact-info__card">
                <div class="contact-info__label">Phone</div>
                <a class="contact-info__value"
                   th:href="'tel:' + ${brand.contactPhone()}"
                   th:text="${brand.contactPhone()}">phone</a>
            </div>
        </div>

        <div class="content-page__prose text-center">
            <p>
                For catering or large orders, email is fastest. Otherwise,
                come find us — we're easier to chat with in person, with a
                taco in hand.
            </p>
            <p>
                <a class="btn btn-primary"
                   th:href="${brand.instagramUrl()}"
                   target="_blank" rel="noopener">
                    Follow us on Instagram →
                </a>
            </p>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
