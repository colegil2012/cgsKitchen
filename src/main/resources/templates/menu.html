<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head(~{::title}, ~{::pageStyles})}">
    <title th:text="|Menu — ${brand.brandName()}|">Menu</title>
    <th:block th:fragment="pageStyles">
        <link rel="stylesheet" th:href="@{/css/pages/menu.css}">
    </th:block>
</head>

<body>

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main>
    <header class="menu-page__header">
        <div class="container">
            <span class="stamp text-muted">The menu</span>
            <h1 class="menu-page__title">
                What's on <em>the grill today.</em>
            </h1>
            <p class="text-muted">Tap any item to add it to your cart.</p>
        </div>
    </header>

    <!-- Sticky category navigation -->
    <nav class="menu-page__nav">
        <div class="menu-page__nav-inner">
            <a class="menu-page__category-link"
               th:each="entry : ${menuByCategory}"
               th:href="'#' + ${entry.key}"
               th:text="${entry.key}">category</a>
        </div>
    </nav>

    <!-- Flash message after cart add -->
    <div class="container mt-6" th:if="${addedItem}">
        <div class="alert alert-success">
            <span>✓</span>
            <span>Added <strong th:text="${addedItem}">item</strong> to your cart.</span>
        </div>
    </div>
    <div class="container mt-6" th:if="${error}">
        <div class="alert alert-error" th:text="${error}">error</div>
    </div>

    <!-- Categorized item lists -->
    <th:block th:each="entry : ${menuByCategory}">
        <section class="menu-category" th:id="${entry.key}">
            <div class="container">
                <header class="menu-category__heading">
                    <h2 class="menu-category__title" th:text="${entry.key}">Category</h2>
                </header>
                <div class="menu-category__grid">
                    <article class="menu-card"
                             th:each="item : ${entry.value}"
                             th:classappend="${!item.available} ? 'menu-card--unavailable'">
                        <div class="menu-card__body">
                            <div class="menu-card__header">
                                <h3 class="menu-card__name" th:text="${item.name}">Name</h3>
                                <span class="menu-card__badge"
                                      th:if="${item.badge != null}"
                                      th:text="${item.badge}">Badge</span>
                            </div>
                            <p class="menu-card__description" th:text="${item.description}">Desc</p>
                            <div class="menu-card__price" th:text="${item.priceDisplay}">$0.00</div>
                        </div>
                        <form th:action="@{/cart/add}" method="post">
                            <input type="hidden" name="menuItemId" th:value="${item.id}">
                            <input type="hidden" name="quantity" value="1">
                            <button class="menu-card__add" type="submit" aria-label="Add to cart">+</button>
                        </form>
                    </article>
                </div>
            </div>
        </section>
    </th:block>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
