# =============================================================================
# cgsKitchen — application configuration
# =============================================================================

kind: Application

spring:
  application:
    name: cgsKitchen

  # ---------------------------------------------------------------------------
  # MongoDB
  # ---------------------------------------------------------------------------
  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/cgskitchen}
    auto-index-creation: true

  # ---------------------------------------------------------------------------
  # Spring Sessions
  # ---------------------------------------------------------------------------
  session:
    timeout: 2h
    data:
      mongodb:
        collection-name: sessions

  # ---------------------------------------------------------------------------
  # Spring Mail
  # ---------------------------------------------------------------------------
  mail:
    host: ${MAIL_SMTP_HOST:smtp.office365.com}
    port: ${MAIL_SMTP_PORT:587}
    username: ${MAIL_SMTP_USERNAME:cole@celtechgs.com}
    password: ${MAIL_SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          connectiontimeout: 3000
          timeout: 3000
          writetimeout: 3000
          auth: true
          starttls:
            enable: true

  # ---------------------------------------------------------------------------
  # Thymeleaf — disable cache in dev for live reload
  # ---------------------------------------------------------------------------
  thymeleaf:
    cache: ${THYMELEAF_CACHE:false}
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML

  web:
    resources:
      # Disable resource caching in dev so CSS edits show up on refresh
      cache:
        period: ${STATIC_RESOURCE_CACHE:0}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  shutdown: graceful
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json
    min-response-size: 1024
  servlet:
    session:
      timeout: 2h

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    mail:
      enabled: false
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      client_id: ${CLIENT_ID:unset}

# =============================================================================
# Application config
# =============================================================================
app:
  client-id: ${CLIENT_ID:celtech-kitchen}
  api-key: ${API_KEY:dev-shared-key-change-me}
  base-url: ${BASE_URL:http://localhost:8080}
  cors-allowed-origins: ${CORS_ORIGINS:http://localhost:8080,http://localhost:3001,http://localhost:5173,http://localhost:5174,http://localhost:5175}

  security:
    bcrypt:
      strength: ${BCRYPT_STRENGTH:12}

  cookies:
    secure: ${COOKIE_SECURE:true}

  captcha:
    site-key: ${CAPTCHA_SITE_KEY:1x00000000000000000000AA}
    secret-key: ${CAPTCHA_SECRET_KEY:1x0000000000000000000000000000000AA}

  storefront:
    brand-name: ${BRAND_NAME:Celtech Kitchen}
    timezone: ${TIMEZONE:America/New_York}
    tagline: ${BRAND_TAGLINE:Celtic Dishes, Kentucky Sourced.}
    contact-email: ${CONTACT_EMAIL:cole@celtechgs.com}
    contact-phone: ${CONTACT_PHONE:(502) 539-9605}
    images:
      base-url: ${IMAGES_BASE_URL:}
      logo-path: ${LOGO_PATH:/images/logo.png}
      logo-mark-path: ${LOGO_MARK_PATH:/images/logo-mark.png}
      hero-path: ${HERO_PATH:/images/hero.jpg}
      og-image-path: ${OG_IMAGE_PATH:/images/og-image.jpg}
      favicon-path: ${FAVICON_PATH:/images/favicon.ico}
    instagram-url: ${INSTAGRAM_URL:}
    facebook-url: ${FACEBOOK_URL:}
    tax-rate: ${TAX_RATE:0.07}

  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    terminal-location-id: ${STRIPE_LOCATION_ID:}

  delivery:
    provider: ${DELIVERY_PROVIDER:mock}
    pickup-address: ${PICKUP_ADDRESS:218 Bluebill Ct, Shepherdsville, KY 40165}
    doordash:
      developer-id: ${DOORDASH_DEV_ID:}
      key-id: ${DOORDASH_KEY_ID:}
      signing-secret: ${DOORDASH_SIGNING_SECRET:}
    uber:
      customer-id: ${UBER_CUSTOMER_ID:}
      client-id: ${UBER_CLIENT_ID:}
      client-secret: ${UBER_CLIENT_SECRET:}
      webhook-signing-key: ${UBER_WEBHOOK_SIGNING_KEY:}

#==============================================================================
# Kitchen Configuration
# Capacity is metric for kitchen capacity, 2 ~ 1 single operator
#                                          3-4 ~ 2 operators kitchen/pos split
#                                          5+ ~ 3+ operators full-staff
#==============================================================================

  kitchen:
    capacity: ${KITCHEN_CAPACITY:2}
    default-item-prep-minutes: ${KITCHEN_DEFAULT_ITEM_PREP_MINUTES:10}
    per-item-surcharge-minutes: ${KITCHEN_PER_ITEM_SURCHARGE_MINUTES:1}

#==============================================================================
# Event Configuration
#==============================================================================

  events:
    auto-close-grace-hours: ${EVENTS_AUTO_CLOSE_GRACE_HOURS:4}
    activation-lead-time-minutes: ${EVENTS_ACTIVATION_LEAD_TIME_MINUTES:15}

#==============================================================================
# Mailer Configuration
#==============================================================================

  mail:
    enabled: ${MAIL_ENABLED:true}
    from: ${MAIL_FROM:support@celtechgs.com}
    from-name: ${MAIL_FROM_NAME:Celtech Kitchen}
    reply-to: ${MAIL_REPLY_TO:cole@celtechgs.com}

  checkout:
    debug-js: ${CHECKOUT_DEBUG_JS:false}

logging:
  level:
    root: INFO
    com.celtech.solutions.cgsKitchen: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.web: DEBUG
